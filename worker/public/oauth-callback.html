<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Signing in…</title>
    <style>
      body { font: 16px/1.5 system-ui, sans-serif; max-width: 24rem; margin: 4rem auto; padding: 0 1rem; text-align: center; }
    </style>
  </head>
  <body>
    <p>Signing you in… you can close this window.</p>
    <script>
      // This page is the GitHub OAuth redirect target. It hands the one-time code
      // back to the opener (the forwarding form) via postMessage, then closes.
      // The code is never POSTed from here and never persisted.
      const params = new URLSearchParams(location.search);
      const payload = {
        source: "denizens-oauth",
        code: params.get("code") || "",
        state: params.get("state") || "",
        error: params.get("error") || "",
      };
      if (window.opener) {
        // Target the exact opener origin so the code can't leak to another site.
        window.opener.postMessage(payload, location.origin);
      }
      // Strip the code from this URL so it isn't left in history.
      history.replaceState({}, "", location.pathname);
      setTimeout(() => window.close(), 200);
    </script>
  </body>
</html>
