<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Set up email forwarding · devis.im</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
      :root { color-scheme: light dark; }
      body { font: 16px/1.5 system-ui, sans-serif; max-width: 30rem; margin: 4rem auto; padding: 0 1rem; }
      h1 { font-size: 1.4rem; }
      label { display: block; margin: 1rem 0 0.25rem; font-weight: 600; }
      input { width: 100%; padding: 0.6rem; font-size: 1rem; box-sizing: border-box; }
      button { margin-top: 1.25rem; padding: 0.7rem 1.2rem; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }
      button[disabled] { cursor: progress; opacity: 0.7; }
      .spinner { width: 1em; height: 1em; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; display: none; animation: spin 0.6s linear infinite; }
      button[disabled] .spinner { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
      .note { color: #666; font-size: 0.9rem; }
      #msg { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; display: none; }
      #msg.ok { background: #e6f5ea; color: #14622f; display: block; }
      #msg.err { background: #fdeaea; color: #8a1f1f; display: block; }
    </style>
  </head>
  <body>
    <h1>Set up your <code>name@devis.im</code> forwarding</h1>
    <p class="note">
      Enter the name you already claimed and the inbox you want mail forwarded to.
      Cloudflare will email that inbox a verification link — click it to activate.
      Your address is sent privately and is never stored in the public registry.
    </p>

    <form id="form">
      <label for="name">Your name (the one you claimed)</label>
      <input id="name" name="name" inputmode="lowercase" autocomplete="off"
             pattern="[a-z0-9]([a-z0-9-]*[a-z0-9])?" required placeholder="rajan" />

      <label for="email">Forward mail to</label>
      <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />

      <!-- Turnstile site key (public). -->
      <div class="cf-turnstile" data-sitekey="0x4AAAAAADkF3BmANU9KSpW5" style="margin-top:1rem"></div>

      <button type="submit"><span class="spinner" aria-hidden="true"></span><span class="btn-label">Activate forwarding</span></button>
    </form>

    <div id="msg"></div>

    <script>
      // Deployed Worker URL.
      const WORKER_URL = "https://denizens-email-intake.rubyonrails.workers.dev";
      const form = document.getElementById("form");
      const msg = document.getElementById("msg");
      const submitBtn = form.querySelector('button[type="submit"]');
      const btnLabel = submitBtn.querySelector(".btn-label");

      function setBusy(busy) {
        submitBtn.disabled = busy;
        btnLabel.textContent = busy ? "Activating…" : "Activate forwarding";
      }

      // Prefill the name from ?name= (the provisioning bot links here with it).
      const params = new URLSearchParams(location.search);
      if (params.get("name")) document.getElementById("name").value = params.get("name");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.className = "";
        msg.style.display = "none";
        const turnstileToken = (form.querySelector('[name="cf-turnstile-response"]') || {}).value || "";
        if (!turnstileToken) {
          show("err", "Please complete the verification checkbox.");
          return;
        }
        setBusy(true);
        try {
          const res = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: document.getElementById("name").value.trim().toLowerCase(),
              email: document.getElementById("email").value.trim(),
              turnstileToken,
            }),
          });
          const data = await res.json();
          if (data.ok) {
            show("ok", data.message);
            form.reset();
          } else {
            show("err", data.error || "Something went wrong.");
          }
        } catch {
          show("err", "Network error. Please try again.");
        } finally {
          setBusy(false);
        }
        if (window.turnstile) window.turnstile.reset();
      });

      function show(kind, text) {
        msg.className = kind;
        msg.textContent = text;
        msg.style.display = "block";
      }
    </script>
  </body>
</html>
