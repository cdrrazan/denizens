name = "denizens-email-intake"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Non-secret config only. Secrets (CF_API_TOKEN, CF_ACCOUNT_ID, CF_ZONE_ID,
# TURNSTILE_SECRET) are set with `wrangler secret put <NAME>` and never tracked.
[vars]
ZONE_NAME = "devis.im"
GH_RAW_BASE = "https://raw.githubusercontent.com/cdrrazan/denizens/main/domains"
# The origin of the Pages form, locked down for CORS. Set to your real form URL.
ALLOWED_ORIGIN = "https://claim.devis.im"
