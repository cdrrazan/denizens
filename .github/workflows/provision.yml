name: Provision claim

on:
  push:
    branches: [main]
    paths:
      - "domains/**"

# Serialize provisioning runs so concurrent merges never race on DNS.
concurrency:
  group: provision
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the before/after commits to diff the merge.
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          # provision.rb uses only the standard library — no bundle needed.

      - name: Provision DNS
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ZONE_NAME: devis.im
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMAIL_FORM_URL: ${{ vars.EMAIL_FORM_URL }}
        run: ruby scripts/provision.rb
