name: Provision claim

on:
  push:
    branches: [main]
    paths:
      - "domains/**"

# Serialize provisioning runs so concurrent merges never race on DNS.
concurrency:
  group: provision
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the before/after commits to diff the merge.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Provision DNS
        id: provision
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ZONE_NAME: devis.im
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          EMAIL_COMMENTS_PATH: email-comments.json
        run: node scripts/provision.js

      - name: Comment email-setup link
        if: always()
        uses: actions/github-script@v7
        env:
          EMAIL_FORM_URL: ${{ vars.EMAIL_FORM_URL }}
        with:
          script: |
            const fs = require("fs");
            if (!fs.existsSync("email-comments.json")) return;
            const names = JSON.parse(fs.readFileSync("email-comments.json", "utf8"));
            if (!names.length) return;
            const formUrl = process.env.EMAIL_FORM_URL;
            if (!formUrl) {
              console.log("EMAIL_FORM_URL not set — skipping email-setup comment.");
              return;
            }
            const { owner, repo } = context.repo;
            // Find the PR(s) associated with this merge commit.
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: context.sha,
            });
            if (!prs.length) {
              console.log("No PR associated with this commit — cannot comment.");
              return;
            }
            const issue_number = prs[0].number;
            for (const name of names) {
              const link = `${formUrl}?name=${encodeURIComponent(name)}`;
              const body =
                `<!-- denizens-email-setup -->\n` +
                `### 📨 Set up \`${name}@devis.im\` forwarding\n\n` +
                `Your subdomain is live. To finish email forwarding, submit your forwarding ` +
                `address privately here: ${link}\n\n` +
                `You'll then get a verification email from Cloudflare — click the link in it ` +
                `to activate forwarding. **Never** post your forwarding address in this repo.`;
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enforce result
        if: always()
        run: |
          if [ "${{ steps.provision.outcome }}" != "success" ]; then
            echo "Provisioning had failures — see the log above."
            exit 1
          fi
