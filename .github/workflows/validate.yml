name: Validate claim

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Fetch base commit too so the script can read prior file state.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-save ajv@8 ajv-formats@3

      - name: Collect changed files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              }
            );
            const slim = files.map((f) => ({ filename: f.filename, status: f.status }));
            require("fs").writeFileSync("changed.json", JSON.stringify(slim));

      - name: Validate
        id: validate
        continue-on-error: true
        env:
          CHANGED_FILES_JSON: changed.json
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          COMMENT_PATH: comment.md
        run: node scripts/validate-claim.js

      - name: Post result comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- denizens-validation -->";
            const body = fs.existsSync("comment.md")
              ? fs.readFileSync("comment.md", "utf8")
              : `${marker}\n### ❌ Claim validation failed\n\nThe validation script did not run to completion. Check the Actions log.\n`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enforce result
        if: always()
        run: |
          if [ "${{ steps.validate.outcome }}" != "success" ]; then
            echo "Validation failed — see the PR comment."
            exit 1
          fi
