name: Blocklist check

on:
  schedule:
    # Weekly, Monday 06:00 UTC. Domain reputation moves slowly — daily is overkill.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  blocklist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          # blocklist-check.rb uses only the standard library — no bundle needed.

      - name: Check blocklists
        env:
          ZONE_NAME: devis.im
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby scripts/blocklist-check.rb
